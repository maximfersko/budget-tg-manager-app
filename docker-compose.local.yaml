services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: on-failure
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "${BOT_EXTERNAL_PORT}:${BOT_PORT}"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  db:
    image: postgres:15-alpine
    container_name: bot_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bot_redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_EXTERNAL_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: bot_redisinsight
    restart: always
    environment:
      - RI_APP_HOST=0.0.0.0
      - RI_APP_PORT=${REDISINSIGHT_PORT:-8001}
    ports:
      - "${REDISINSIGHT_EXTERNAL_PORT:-8001}:${REDISINSIGHT_PORT:-8001}"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    restart: always
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_EXTERNAL_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_MANAGEMENT_EXTERNAL_PORT}:${RABBITMQ_MANAGEMENT_PORT}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_worker
    command: celery -A workers.celery_worker worker --loglevel=info --concurrency=2 -Q celery,default,high,low
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      db:
        condition: service_started
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower
    command: celery -A workers.celery_worker flower --port=${FLOWER_PORT}
    restart: on-failure
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env
    ports:
      - "${FLOWER_EXTERNAL_PORT}:${FLOWER_PORT}"
    environment:
      - PYTHONUNBUFFERED=1

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MINIO_EXTERNAL_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_EXTERNAL_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${MINIO_PORT}/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_EXTERNAL_PORT}:${QDRANT_PORT}"
      - "${QDRANT_DASHBOARD_EXTERNAL_PORT}:${QDRANT_PORT}"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pg_data:
  redis_data:
  redisinsight_data:
  rabbitmq_data:
  minio_data:
  qdrant_data:
  keycloak_db_data:

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${KEYCLOAK_DB_NAME}
      - POSTGRES_USER=${KEYCLOAK_DB_USER}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HTTP_PORT=8080
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_PORT=${KEYCLOAK_HTTP_PORT}
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: frontend_dev
    working_dir: /app
    env_file:
      - .env
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:${KEYCLOAK_HTTP_PORT}
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm ci || npm i && npm run dev"
    depends_on:
      - keycloak

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: on-failure
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "${BOT_EXTERNAL_PORT}:${BOT_PORT}"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  db:
    image: postgres:15-alpine
    container_name: bot_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bot_redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_EXTERNAL_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    restart: always
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_EXTERNAL_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_MANAGEMENT_EXTERNAL_PORT}:${RABBITMQ_MANAGEMENT_PORT}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_worker
    command: celery -A workers.tasks worker --loglevel=info --concurrency=2
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      db:
        condition: service_started
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower
    command: celery -A workers.tasks flower --port=${FLOWER_PORT}
    restart: on-failure
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env
    ports:
      - "${FLOWER_EXTERNAL_PORT}:${FLOWER_PORT}"
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  pg_data:
  redis_data:
  rabbitmq_data: